name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 src/ api/ tests/ --max-line-length=100 --ignore=E501,W503

      - name: Type check with mypy
        run: |
          pip install mypy
          mypy src/preprocessing.py src/explain.py --ignore-missing-imports

      - name: Syntax check all Python files
        run: |
          for f in src/*.py api/*.py tests/*.py notebooks/*.py; do
            python -m py_compile "$f" && echo "OK: $f"
          done

      - name: Run unit tests (no model artifacts required)
        run: |
          pip install pytest
          pytest tests/ -v -k "not (client)" --tb=short

      - name: Validate config schema
        run: |
          python -c "
          import yaml
          with open('configs/config.yaml') as f:
              config = yaml.safe_load(f)
          required = ['data', 'preprocessing', 'features', 'models', 'threshold', 'business', 'api']
          for key in required:
              assert key in config, f'Missing config section: {key}'
          print('Config validation passed')
          "
